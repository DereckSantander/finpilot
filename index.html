<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f11" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="FinPilot — Centro de control financiero personal, offline-first."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>FinPilot — Finanzas personales</title>
    <!--
      Anti-FOUC: aplica el tema guardado ANTES del primer paint para evitar el
      parpadeo claro/oscuro. Fuente síncrona = localStorage (espejo de settings).
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('finpilot-theme');
          var theme = stored || 'system';
          var isDark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {
          /* localStorage no disponible: se usa el tema por defecto */
        }
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <noscript>Necesitas habilitar JavaScript para usar FinPilot.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
